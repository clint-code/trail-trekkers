<div class="compass-section min-[720px]:hidden">
  <div
    class="draggable-item absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2"
    id="compass-icon"
  >
    <img
      src="assets/img/vector-icons/compass.png"
      class="h-20 w-auto rotating-compass"
      alt="compass"
    />
  </div>

  <div class="instructions">
    <p class="text-center font-ringBearer text-orange-600 max-[480px]:text-xl">
      Tilt thine screen, the paths appear,
    </p>

    <p class="text-center font-ringBearer text-orange-600 max-[480px]:text-xl">
      What lay hidden, now draws near,
    </p>

    <p class="text-center font-ringBearer text-orange-600 max-[480px]:text-xl">
      Hold thy shard of captured light,
    </p>

    <p class="text-center font-ringBearer text-orange-600 max-[480px]:text-xl">
      And ancient roads emerge from night.
    </p>
  </div>
</div>

<div class="map-page relative mb-10 mt-10 max-[720px]:hidden">
  <!-- Replay button -->
  <button class="replay-btn font-passion" (click)="replayAnimation()">
    ↺ Replay Animation
  </button>

  <!-- Zoom controls -->
  <!-- <div class="zoom-controls">
    <button (click)="resetZoom()" class="font-passion" title="Reset">
      ↺ Reset Map
    </button>
  </div> -->


  <div
    #cloudIconTop
    class="absolute top-5 right-1/4"
  >
    <img
      src="assets/img/vector-icons/clouds.png"
      class="h-auto w-auto"
      alt="clouds"
    />
  </div>

  <svg
    #svgEl
    [attr.viewBox]="svgViewBox"
    width="100%"
    height="100%"
    xmlns="http://www.w3.org/2000/svg"
    class="trail-svg mb-10 mt-5"
  >
    <g>
      <!-- Base map injected here — no 2000 lines in template -->
      <g #mapContainer [innerHTML]="svgContent"></g>

      <!-- Dynamic red labels on top -->
      <g
        *ngFor="let label of labels"
        [attr.transform]="getTransform(label)"
        class="map-label"
        style="opacity: 0"
      >
        <a routerLink="/single-hike/`{label.link}`">
          <text
            style="cursor: pointer"
            *ngFor="let location of label.lines; let i = index"
            label.status
            [attr.x]="label.x"
            [attr.y]="getLineY(label, i)"
            [attr.font-size]="label.fontSize"
            font-family="'marauders-map', serif"
            font-weight="700"
            fill="#ed1111"
            letter-spacing="2"
            text-anchor="middle"
          >
            {{ location }}
            
          </text>
        </a>
      </g>
    </g>
  </svg>

  <div
   #cloudIconBottom
    class="absolute -bottom-3 left-20"
    id="clouds-icon"
  >
    <img
      src="assets/img/vector-icons/clouds.png"
      class="h-auto w-auto"
      alt="clouds"
    />
  </div>

</div>
